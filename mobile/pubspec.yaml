name: gerecom_pesqueira
description: GereCom Pesqueira — Gestão de Comunicação Municipal

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management (MVC via ChangeNotifier)
  provider: ^6.1.2
  # HTTP client para comunicação com a API MySQL
  dio: ^5.7.0
  # Armazenamento do token JWT
  shared_preferences: ^2.3.2
  # Geração de UUID
  uuid: ^4.4.2
  # Formatação de datas
  intl: ^0.19.0
  # Ícones
  cupertino_icons: ^1.0.8
  pdf: ^3.12.0
  printing: ^5.14.3
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  google_maps_flutter: ^2.9.0
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
