# GereCom Pesqueira — VPS deployment with Traefik
# Network: sictecnet (external, managed by Traefik)
#
# Usage:
#   1. Copy .env.example to .env and fill in the values
#   2. docker compose pull && docker compose up -d

services:
  gerecom-api:
    image: ghcr.io/${GITHUB_OWNER}/${GITHUB_REPO}:${IMAGE_TAG:-latest}
    container_name: gerecom-api
    restart: unless-stopped

    environment:
      NODE_ENV: production
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-gerecom_pesqueira}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}

    networks:
      - sictecnet

    labels:
      - 'traefik.enable=true'

      # ── Router HTTP (redireciona para HTTPS) ───────────────────────────────
      - 'traefik.http.routers.gerecom-api-http.rule=Host(`${API_HOST}`)'
      - 'traefik.http.routers.gerecom-api-http.entrypoints=web'
      - 'traefik.http.routers.gerecom-api-http.middlewares=redirect-to-https'

      # ── Router HTTPS ───────────────────────────────────────────────────────
      - 'traefik.http.routers.gerecom-api.rule=Host(`${API_HOST}`)'
      - 'traefik.http.routers.gerecom-api.entrypoints=websecure'
      - 'traefik.http.routers.gerecom-api.tls=true'
      - 'traefik.http.routers.gerecom-api.tls.certresolver=letsencrypt'

      # ── Service (porta interna do contêiner) ───────────────────────────────
      - 'traefik.http.services.gerecom-api.loadbalancer.server.port=3000'

      # ── Middleware: HTTPS redirect (reaproveitável) ────────────────────────
      - 'traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https'
      - 'traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true'

    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

networks:
  sictecnet:
    external: true
