name: Build & Push Docker image to GHCR

on:
  push:
    tags:
      - 'v*.*.*' # dispara em tags como v1.0.0, v2.3.1, etc.

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # owner/repo em minúsculas

jobs:
  build-and-push:
    name: Build e Push para GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write # necessário para publicar no GHCR

    steps:
      # 1. Checkout do código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configura QEMU para builds multi-arch (arm64 / amd64)
      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Buildx para builds multi-plataforma e cache eficiente
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Login no GitHub Container Registry
      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Extrai metadata (tags e labels) baseada na tag git
      - name: Extrair metadata da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      # 6. Build e push da imagem (context: ./backend)
      - name: Build e Push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
